<section id="contact" class="contact" style="padding: 6rem 5%; display: flex; justify-content: center;">
  <div class="glass card reveal" style="width: 100%; max-width: 600px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Contáctanos</h2>
    <form id="contactForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div style="position: relative;">
        <input type="text" placeholder="Nombre completo" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; outline: none; transition: border 0.3s;">
      </div>
      <div style="position: relative;">
        <input type="email" placeholder="Correo corporativo" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; outline: none; transition: border 0.3s;">
      </div>
      <div style="position: relative;">
        <textarea placeholder="¿Cómo podemos ayudarte?" required rows="4" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; outline: none; transition: border 0.3s;"></textarea>
      </div>
      <button type="submit" class="cta" style="width: 100%;">Enviar Mensaje</button>
    </form>
  </div>
</section>
