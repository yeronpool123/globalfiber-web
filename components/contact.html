<section id="contact" class="contact" style="padding: 6rem 5%; display: flex; justify-content: center;">
  <div class="glass card reveal" style="width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.95) !important;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #003366;">Contáctanos</h2>
    
    
    <<form id="contactForm" style="display: flex; flex-direction: column; gap: 1.5rem;">

  <div style="position: relative;">
    <input 
      type="text"
      name="from_name"
      placeholder="Nombre completo"
      required
      style="width: 100%; padding: 1rem; background: rgba(0,51,102,0.05); border: 1px solid rgba(0,51,102,0.2); color: #1a1a1a; border-radius: 8px; outline: none; transition: border 0.3s; font-weight: 500;"
    >
  </div>

  <div style="position: relative;">
    <input
      type="email"
      name="from_email"
      placeholder="Correo corporativo"
      required
      style="width: 100%; padding: 1rem; background: rgba(0,51,102,0.05); border: 1px solid rgba(0,51,102,0.2); color: #1a1a1a; border-radius: 8px; outline: none; transition: border 0.3s; font-weight: 500;"
    >
  </div>

  <div style="position: relative;">
    <textarea
      name="message"
      placeholder="¿Cómo podemos ayudarte?"
      required
      rows="4"
      style="width: 100%; padding: 1rem; background: rgba(0,51,102,0.05); border: 1px solid rgba(0,51,102,0.2); color: #1a1a1a; border-radius: 8px; outline: none; transition: border 0.3s; font-weight: 500; font-family: 'Poppins', sans-serif; resize: vertical;"
    ></textarea>
  </div>

  <button type="submit" class="cta" style="width: 100%;">
    Enviar Mensaje
  </button>

</form>
  </div>
</section>
